spring.application.name=facebook-service
spring.main.allow-bean-definition-overriding=true
#debug
logging.level.org.springframework.web.server=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.security.web.server=TRACE
# cache
cache.ttl.user-token=900
cache.ttl.page-token=1800
# mysql
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC+7
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.type.preferred_uuid_jdbc_type=BINARY

# Phase 1 App Review feature flags. Later phases can enable these explicitly.
facebook.features.ads.enabled=false
facebook.features.comments.enabled=false
facebook.features.insights.enabled=false
facebook.features.scheduled-posts.enabled=false
facebook.features.sync-history.enabled=false

# Demo reviewer auth for App Review phase 1.
app.demo.email=${DEMO_EMAIL:reviewer@ezisolutions.tech}
app.demo.password=${DEMO_PASSWORD:reviewer-password}
app.demo.user-id=${DEMO_USER_ID:demo-reviewer}
app.demo.name=${DEMO_NAME:Meta Reviewer}

# Token encryption secret. Override in every real environment.
facebook.token-encryption-secret=${FACEBOOK_TOKEN_ENCRYPTION_SECRET:local-dev-change-me}
